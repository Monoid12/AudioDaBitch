<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AudioDaBitch</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; color: #eee; background: #202020; padding: 12px; }
    label { display: block; margin-top: 10px; }
    select, input { width: 100%; }
    small { color: #bbb; }
  </style>
</head>
<body>
  <h3>AudioDaBitch</h3>
  <label>Parameter</label>
  <select id="param">
    <option value="xpilot_gain">xPilot Gain</option>
    <option value="master_gain">Master Gain</option>
    <option value="duck_depth">Ducking-Tiefe</option>
    <option value="xpilot_target">xPilot Zielpegel</option>
    <option value="ducking">Ducking Toggle</option>
    <option value="xpilot_agc">xPilot Auto-Level Toggle</option>
  </select>
  <label>Schrittweite dB pro Key/Dial Tick</label>
  <input id="delta" type="number" step="0.1" value="1" />
  <label>Dial Push</label>
  <select id="push">
    <option value="ducking">Ducking Toggle</option>
    <option value="xpilot_agc">xPilot Auto-Level Toggle</option>
  </select>
  <small>AudioDaBitch muss laufen und die Audio-Engine muss gestartet sein.</small>
  <script>
    let websocket, uuid, actionInfo;
    function connectElgatoStreamDeckSocket(port, piUUID, registerEvent, info, actionInfoArg) {
      uuid = piUUID; actionInfo = JSON.parse(actionInfoArg);
      websocket = new WebSocket('ws://127.0.0.1:' + port);
      websocket.onopen = () => websocket.send(JSON.stringify({ event: registerEvent, uuid }));
      websocket.onmessage = ev => {
        const msg = JSON.parse(ev.data);
        if (msg.event === 'didReceiveSettings') apply(msg.payload.settings || {});
      };
      ['param','delta','push'].forEach(id => document.getElementById(id).addEventListener('change', save));
    }
    function apply(s) {
      if (s.param) document.getElementById('param').value = s.param;
      if (s.delta) document.getElementById('delta').value = s.delta;
      if (s.push) document.getElementById('push').value = s.push;
    }
    function save() {
      const settings = {
        param: document.getElementById('param').value,
        delta: Number(document.getElementById('delta').value || 1),
        step: Number(document.getElementById('delta').value || 1),
        push: document.getElementById('push').value
      };
      websocket.send(JSON.stringify({ event: 'setSettings', context: uuid, payload: settings }));
    }
  </script>
</body>
</html>
