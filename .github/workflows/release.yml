name: Release AudioDaBitch

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build app and pkg
        run: VERSION="$VERSION" ./scripts/build_pkg.sh
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: AudioDaBitch v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/AudioDaBitch.pkg
            dist/AudioDaBitch.app.zip
            dist/SHA256SUMS.txt
